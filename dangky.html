                    <td><label for="email"><b>Email</b></label></td>

                <tr>
                    <td>

                </tr>
                <tr>
                    <td>
                        <label for="capdothanhvien"><b>Cấp độ thành viên</b></label>
                    </td>
                    <td>
                        <input type="radio" name="memberType" id="bac"><label for="bac"><b>Bạc</b></label>
                        <input type="radio" name="memberType" id="vang"><label for="vang"><b>Vàng</b></label>
                        <input type="radio" name="memberType" id="bachkim"><label for="bachkim"><b>Bạch Kim</b></lable>

                </tr>
                <tr>

                    </td>

                        <input type="file" id="anhdaidien">
