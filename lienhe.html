<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Liên hệ</title>
        <link href="images/favicon.ico" rel="shortcut icon" type="images/vnd.microsoft.icon">
    </head>
    <body>
        <header>
            <a href="trangchu.html">
                <img id="logo" src="images/logo.png">
                <img class="header-img1" src="TH_B2_Data/header-img1.png">
                <img class="header-img2" src="TH_B2_Data/header-img2.png">
                <img class="header-img3" src="TH_B2_Data/header-img3.png">
            </a>
        </header>
        <nav>
            <a href="trangchu.html">Trang chủ</a>
            <a href="gioithieu.html">Giới thiệu</a>
            <a href="sanpham.html">Sản phẩm</a>
            <a href="tintuc.html">Tin tức</a>
            <a href="dangnhap.html">Đăng nhập</a>
            <a href="dangky.html">Đăng ký</a>
            <a href="lienhe.html">Liên hệ</a> 
        </nav>
        <main>
           <h1>
                <b>Liên hệ</b>
           </h1>
           <img src="images/lienhe/check-in.png">
           <h1>
                <b>Địa chỉ: 0123, Tòa Nhà ABC, TP. Cần Thơ</b>
           </h1>
           <p>
            Nếu có góp ý, vui lòng liên hệ bằng thư điện tử hoặc sử dụng biểu mẫu bên dưới. Xin cảm ơn
           </p>

           <fieldset>
                <legend>
                    Góp ý
                </legend>
                <form method="post" enctype="application/x-www-form-urlencoded">
                    <table>
                        <tr>
                            <td>
                                <label for="hoten">Họ tên:</label>
                            </td>
                            <td>
                                <input type="text" placeholder="Vui lòng nhập Họ tên của bạn" id="hoten">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="email">Email:</label>
                            </td>
                            <td>
                                <input type="text" placeholder="Vui lòng nhập địa chỉ Email" id="email">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="chude">Chủ đề:</label>
                            </td>
                            <td>
                                <select id="chude" size="1">
                                    <option value="sanpham">Về Sản Phẩm/Dịch vụ</option>
                                    <option value="thanhvien">Về ưu đãi thành viên</option>
                                    <option value="tuyendung">Về tin tuyển dụng</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                Nội dung:
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <textarea rows="7" cols="50" placeholder="Nội dung cần liên hệ"></textarea>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <input type="submit" value="Gửi">
                            </td>
                        </tr>
                    </table>
                </form>
           </fieldset>
        </main>
        <footer>
            &copy; 2021 Bản quyền thuộc về FreezeVN. 
            <a href="facebook.com">facebook</a>
            <a href="twitter.com">twitter</a>
            <a href="pinterest.com">pinterest</a>
            <a href="#logo">Về đầu trang</a>
        </footer>
    </body>

</html>
